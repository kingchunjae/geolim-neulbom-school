<!-- 비교 섹션 -->
<div style="background: #f9f9f9; padding: 40px 20px;">
  <div style="max-width: 500px; margin: 0 auto;">

    <h2 style="font-size: 22px; font-weight: 800; color: #222; line-height: 1.4; margin-bottom: 24px;">

    <table style="width: 100%; border-collapse: collapse; font-size: 14px;">

      <tbody>
        <tr>
          <td style="padding: 12px; border-bottom: 1px solid #eee; text-align: center; color: #444;">항목 1</td>

        </tr>
        <tr>
          <td style="padding: 12px; text-align: center; color: #444;">항목 3</td>
          <td style="padding: 12px; text-align: center; color: var(--main-color, #FF6B35); font-weight: 700;">✅ 최저가</td>
          <td style="padding: 12px; text-align: center; color: #999;">❌ 비쌈</td>
        </tr>
      </tbody>
    </table>
