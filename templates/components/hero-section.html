<!-- 히어로 섹션: 후킹 헤드라인 -->
<div style="background: var(--bg-color, #FFF8F0); padding: 40px 20px; text-align: center;">
  <div style="max-width: 500px; margin: 0 auto;">
    <img src="../../brand/logo/logo.png" alt="로고" style="height: 50px; margin-bottom: 24px;" onerror="this.style.display='none'">
    <p style="font-size: 14px; color: var(--sub-color, #888); margin-bottom: 8px; letter-spacing: 2px;">[ 상품 태그라인 ]</p>
    <h1 style="font-size: 28px; font-weight: 900; color: var(--main-color, #333); line-height: 1.3; margin-bottom: 16px;">
      스크롤을 멈추게 하는<br>한 줄 헤드라인
    </h1>
    <p style="font-size: 16px; color: #555; line-height: 1.6; margin-bottom: 24px;">
      고객의 마음을 움직이는 한 줄 서브카피
    </p>
    <div style="background: #f0f0f0; height: 300px; display: flex; align-items: center; justify-content: center; border-radius: 12px; color: #999; font-size: 14px;">
      여기에 상품 사진을 넣으세요
    </div>
